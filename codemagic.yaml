workflows:
  android-debug:
    name: BugFood Android Debug
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Set gradlew executable
        script: |
          chmod +x gradlew
      - name: Build debug APK
        script: |
          ./gradlew assembleDebug --stacktrace
    artifacts:
      - app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - widney.rj@gmail.com
        notify:
          success: true
          failure: true
